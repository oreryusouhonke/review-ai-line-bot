services:
  - type: web
    name: review-ai-line-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LINE_HARNESS_BASE_URL
        sync: false
      - key: LINE_HARNESS_WEBHOOK_URL
        sync: false
      - key: LINE_HARNESS_API_KEY
        sync: false
      - key: LINE_HARNESS_FRIEND_LOOKUP_LIMIT
        value: "1000"
      - key: LINE_HARNESS_ACCOUNT_ID
        sync: false
      - key: LINE_HARNESS_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://review-ai-line-bot.onrender.com
      - key: FREE_MONTHLY_QUOTA
        # 0 means free unlimited. Review Shokunin remains free for end users.
        value: "0"
      - key: PAID_MONTHLY_QUOTA
        value: "30"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://review-ai-line-bot.onrender.com/billing/success
      - key: STRIPE_CANCEL_URL
        value: https://review-ai-line-bot.onrender.com/billing/cancel
      - key: STRIPE_ALLOW_PROMOTION_CODES
        value: "false"

services:
  - type: web
    name: review-ai-line-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LINE_HARNESS_BASE_URL
        sync: false
      - key: LINE_HARNESS_API_KEY
        sync: false
      - key: LINE_HARNESS_ACCOUNT_ID
        sync: false
      - key: LINE_HARNESS_WEBHOOK_SECRET
        sync: false
